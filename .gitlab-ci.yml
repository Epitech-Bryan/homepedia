stages:
  - lint
  - release
  - build
  - mirror

variables:
  GIT_DEPTH: 0
  GIT_STRATEGY: clone

workflow:
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - when: always

lint:backend:
  stage: lint
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - apk add --no-cache maven
  script:
    - cd backend && mvn spotless:check -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint:webapp:
  stage: lint
  image: node:22-alpine
  before_script:
    - npm install -g pnpm
    - cd webapp && pnpm install --frozen-lockfile
  script:
    - pnpm lint && pnpm format:check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.release_base:
  stage: release
  image: node:22-alpine
  before_script:
    - apk add --no-cache git curl
    - npm install -g pnpm
    - git remote set-url origin "https://oauth2:${GL_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git config user.email "${GIT_USER_EMAIL:-ci@homepedia.local}"
    - git config user.name "${GIT_USER_NAME:-CI Bot}"
    - pnpm install --frozen-lockfile

# -----------------------------------------------------------------------------
# Release — chaque job ne tourne que si son dossier (ou le common partagé) a
# été modifié depuis le dernier push sur la branche par défaut.
# GitLab CI "changes:" est le filtre natif ; semantic-release décide ensuite
# s'il y a un vrai bump (feat/fix/BREAKING) à créer.
# -----------------------------------------------------------------------------
release:webapp:
  extends: .release_base
  script:
    - npx semantic-release --extends ./webapp/release.config.cjs
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
      changes:
        - webapp/**/*

release:rest-api:
  extends: .release_base
  before_script:
    - !reference [.release_base, before_script]
    - apk add --no-cache openjdk21-jdk maven
  script:
    - npx semantic-release --extends ./backend/rest-api/release.config.cjs
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
      changes:
        - backend/rest-api/**/*
        - backend/common/**/*

.build_base:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

build:webapp:
  extends: .build_base
  rules:
    - if: $CI_COMMIT_TAG =~ /^webapp-v.*/
  script:
    - VERSION=${CI_COMMIT_TAG#webapp-v}
    - docker build -t "$CI_REGISTRY_IMAGE/webapp:$VERSION" -t "$CI_REGISTRY_IMAGE/webapp:latest" ./webapp
    - docker push "$CI_REGISTRY_IMAGE/webapp:$VERSION"
    - docker push "$CI_REGISTRY_IMAGE/webapp:latest"

build:rest-api:
  extends: .build_base
  rules:
    - if: $CI_COMMIT_TAG =~ /^rest-api-v.*/
  script:
    - VERSION=${CI_COMMIT_TAG#rest-api-v}
    - docker build -t "$CI_REGISTRY_IMAGE/rest-api:$VERSION" -t "$CI_REGISTRY_IMAGE/rest-api:latest" -f backend/rest-api/Dockerfile ./backend
    - docker push "$CI_REGISTRY_IMAGE/rest-api:$VERSION"
    - docker push "$CI_REGISTRY_IMAGE/rest-api:latest"

mirror:
  stage: mirror
  image: alpine/git:2.43.0
  needs:
    - job: release:webapp
      optional: true
    - job: release:rest-api
      optional: true
  variables:
    GIT_DEPTH: 0
  before_script:
    - git fetch --tags --force
    - git checkout -B "$CI_COMMIT_BRANCH" HEAD
  script:
    - git push --mirror "$GH_MIRROR_URL"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"


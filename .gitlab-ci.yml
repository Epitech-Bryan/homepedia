stages:
  - lint
  - build
  - release
  - publish
  - mirror

variables:
  GIT_DEPTH: 0
  GIT_STRATEGY: clone

workflow:
  rules:
    # Tag pipelines bypass any [skip ci] filter so manually triggered or
    # legacy tag pushes can still build images.
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - when: always

# -----------------------------------------------------------------------------
# Lint — formatting and static checks. Runs on MR and main pushes.
# -----------------------------------------------------------------------------

lint:backend:
  stage: lint
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - apk add --no-cache maven
  script:
    - cd backend && mvn spotless:check -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint:webapp:
  stage: lint
  image: node:22-alpine
  before_script:
    - npm install -g pnpm
    - cd webapp && pnpm install --frozen-lockfile
  script:
    - pnpm lint && pnpm format:check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# -----------------------------------------------------------------------------
# Build — compile and test. Validates the code before FerrFlow releases it.
# Runs on MR and main pushes. No artifacts are published here.
# -----------------------------------------------------------------------------

build:backend:
  stage: build
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - apk add --no-cache maven
  script:
    - cd backend && mvn -B package
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:webapp:
  stage: build
  image: node:22-alpine
  before_script:
    - npm install -g pnpm
    - cd webapp && pnpm install --frozen-lockfile
  script:
    - pnpm build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# -----------------------------------------------------------------------------
# Release — FerrFlow handles the whole monorepo.
#
# Per-package scope is driven by ferrflow.json. FerrFlow reads conventional
# commits since the last tag, figures out which packages need a bump,
# writes the pom/package.json + CHANGELOG updates, commits "chore(release): …",
# pushes commits + tags, and creates a GitLab Release via the API.
#
# Auth: FerrFlow reads FERRFLOW_TOKEN (GitLab project access token, scope
# api + write_repository) and wires it into libgit2's credentials callback
# + the GitLab Releases API — no manual `git remote set-url` needed.
# The commit author falls back to "FerrFlow <contact@ferrflow.com>" if no
# user.name/user.email are configured.
# -----------------------------------------------------------------------------
release:
  stage: release
  image:
    name: ghcr.io/ferrlabs/ferrflow:4.4.0
    entrypoint: [""]
  script:
    - ferrflow release
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"

# -----------------------------------------------------------------------------
# Publish — build and push Docker images. Runs only on tags created by
# FerrFlow ($CI_COMMIT_TAG matches webapp-v* or rest-api-v*).
# -----------------------------------------------------------------------------

.publish_base:
  stage: publish
  image: quay.io/buildah/stable
  variables:
    STORAGE_DRIVER: vfs
  before_script:
    - buildah login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

publish:webapp:
  extends: .publish_base
  rules:
    - if: $CI_COMMIT_TAG =~ /^webapp-v/
  script:
    - VERSION="${CI_COMMIT_TAG#webapp-v}"
    - echo "Publishing webapp $VERSION"
    - buildah bud -t "$CI_REGISTRY_IMAGE/webapp:$VERSION" -t "$CI_REGISTRY_IMAGE/webapp:latest" -f webapp/Dockerfile .
    - buildah push "$CI_REGISTRY_IMAGE/webapp:$VERSION"
    - buildah push "$CI_REGISTRY_IMAGE/webapp:latest"

publish:rest-api:
  extends: .publish_base
  rules:
    - if: $CI_COMMIT_TAG =~ /^rest-api-v/
  script:
    - VERSION="${CI_COMMIT_TAG#rest-api-v}"
    - echo "Publishing rest-api $VERSION"
    - buildah bud -t "$CI_REGISTRY_IMAGE/rest-api:$VERSION" -t "$CI_REGISTRY_IMAGE/rest-api:latest" -f backend/rest-api/Dockerfile ./backend
    - buildah push "$CI_REGISTRY_IMAGE/rest-api:$VERSION"
    - buildah push "$CI_REGISTRY_IMAGE/rest-api:latest"

# -----------------------------------------------------------------------------
# Mirror — push the repo (branches + tags) to the GitHub mirror.
# -----------------------------------------------------------------------------

mirror:
  stage: mirror
  image: alpine/git:2.43.0
  needs:
    - job: release
      optional: true
  variables:
    GIT_DEPTH: 0
  before_script:
    - git fetch --tags --force
    - git checkout -B "$CI_COMMIT_BRANCH" HEAD
  script:
    - git push --mirror "$GH_MIRROR_URL"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"

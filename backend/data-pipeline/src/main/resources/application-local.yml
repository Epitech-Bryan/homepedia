spring:
  datasource:
    url: jdbc:h2:file:./data/homepedia-dev;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

homepedia:
  dvf:
    zip-path:
  dpe:
    import-enabled: false
  health:
    import-enabled: false
  insee:
    import-enabled: false
  geo:
    import-enabled: false
  import:
    reviews:
      enabled: false

logging:
  level:
    com.homepedia: DEBUG

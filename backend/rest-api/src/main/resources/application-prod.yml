spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

management:
  endpoint:
    health:
      show-details: always

homepedia:
  insee:
    import-enabled: true
  geo:
    import-enabled: true
  dpe:
    import-enabled: ${HOMEPEDIA_DPE_ENABLED:false}
    csv-path: ${HOMEPEDIA_DPE_CSV_PATH:}
  health:
    import-enabled: ${HOMEPEDIA_HEALTH_ENABLED:false}
    csv-path: ${HOMEPEDIA_HEALTH_CSV_PATH:}
  dvf:
    zip-path: ${HOMEPEDIA_DVF_ZIP_PATH:}
  import:
    reviews:
      enabled: ${IMPORT_REVIEWS_ENABLED:false}

logging:
  level:
    com.homepedia: INFO

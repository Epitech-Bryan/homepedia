server:
  # GZIP responses ≥1 KB. JSON payloads (stats, geojson) compress 5-10x —
  # /geo/regions alone drops from ~3 MB to ~400 KB per response.
  compression:
    enabled: true
    mime-types: application/json,application/hal+json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024
  http2:
    enabled: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 30000
      keepalive-time: 120000
      max-lifetime: 1800000
      validation-timeout: 5000
      data-source-properties:
        reWriteBatchedInserts: true
        tcpKeepAlive: true
        socketTimeout: 600
        loginTimeout: 10
        cancelSignalTimeout: 10
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/homepedia}
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true

management:
  endpoints:
    web:
      exposure:
        # threaddump + heapdump help diagnose OOMs / hangs in prod without
        # needing kubectl exec + kill -3 on the JVM. Auth-gated upstream
        # via Spring Security. Prometheus left in for future scrape.
        include: health,info,metrics,threaddump,heapdump,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    heapdump:
      access: read_only
    threaddump:
      access: read_only
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

homepedia:
  batch:
    startup-enabled: ${HOMEPEDIA_BATCH_STARTUP_ENABLED:true}
  spark:
    enabled: ${HOMEPEDIA_SPARK_ENABLED:true}
    submit-command: ${HOMEPEDIA_SPARK_SUBMIT_COMMAND:docker compose exec spark-master spark-submit --class com.homepedia.spark.DvfAggregateJob --master spark://spark-master:7077 --jars /opt/spark/jars/postgresql.jar /jobs/spark-jobs-3.11.1-spark.jar --input-path /data/dvf.csv --jdbc-url jdbc:postgresql://db:5432/homepedia --jdbc-user homepedia --jdbc-password homepedia}
  insee:
    import-enabled: true
  geo:
    import-enabled: true
  dvf:
    import-enabled: ${HOMEPEDIA_DVF_ENABLED:true}
    zip-path: ${HOMEPEDIA_DVF_ZIP_PATH:}
  dpe:
    import-enabled: ${HOMEPEDIA_DPE_ENABLED:true}
    csv-path: ${HOMEPEDIA_DPE_CSV_PATH:}
  health:
    import-enabled: ${HOMEPEDIA_HEALTH_ENABLED:true}
    csv-path: ${HOMEPEDIA_HEALTH_CSV_PATH:}
  economy:
    import-enabled: ${HOMEPEDIA_ECONOMY_ENABLED:false}
    csv-path: ${HOMEPEDIA_ECONOMY_CSV_PATH:}
  education:
    import-enabled: ${HOMEPEDIA_EDUCATION_ENABLED:false}
    csv-path: ${HOMEPEDIA_EDUCATION_CSV_PATH:}
  environment:
    import-enabled: ${HOMEPEDIA_ENVIRONMENT_ENABLED:false}
    csv-path: ${HOMEPEDIA_ENVIRONMENT_CSV_PATH:}
  infrastructure:
    import-enabled: ${HOMEPEDIA_INFRASTRUCTURE_ENABLED:false}
    csv-path: ${HOMEPEDIA_INFRASTRUCTURE_CSV_PATH:}
  import:
    reviews:
      enabled: ${IMPORT_REVIEWS_ENABLED:true}
  scheduler:
    enabled: ${HOMEPEDIA_SCHEDULER_ENABLED:false}
    zone: ${HOMEPEDIA_SCHEDULER_ZONE:Europe/Paris}
    insee:
      cron: ${HOMEPEDIA_SCHEDULER_INSEE_CRON:-}
    geo:
      cron: ${HOMEPEDIA_SCHEDULER_GEO_CRON:-}
    dvf:
      cron: ${HOMEPEDIA_SCHEDULER_DVF_CRON:-}
    dpe:
      cron: ${HOMEPEDIA_SCHEDULER_DPE_CRON:-}
    health:
      cron: ${HOMEPEDIA_SCHEDULER_HEALTH_CRON:-}
    reviews:
      cron: ${HOMEPEDIA_SCHEDULER_REVIEWS_CRON:-}
    economy:
      cron: ${HOMEPEDIA_SCHEDULER_ECONOMY_CRON:-}
    education:
      cron: ${HOMEPEDIA_SCHEDULER_EDUCATION_CRON:-}
    environment:
      cron: ${HOMEPEDIA_SCHEDULER_ENVIRONMENT_CRON:-}
    infrastructure:
      cron: ${HOMEPEDIA_SCHEDULER_INFRASTRUCTURE_CRON:-}

logging:
  level:
    com.homepedia: INFO

resilience4j:
  # Defaults shared by every external API integration. Override per-name
  # below if a provider needs different bounds (e.g. ADEME accepts more
  # concurrent calls than INSEE).
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
    instances:
      insee:
        base-config: default
      ademe:
        base-config: default
      datagouv:
        base-config: default
      geo-api:
        base-config: default
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      insee:
        base-config: default
      ademe:
        base-config: default
      datagouv:
        base-config: default
      geo-api:
        base-config: default

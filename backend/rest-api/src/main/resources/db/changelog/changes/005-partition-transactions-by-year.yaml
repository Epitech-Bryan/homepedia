databaseChangeLog:
  - changeSet:
      id: 005-partition-transactions-by-year
      author: homepedia
      comment: >
        Convert `transactions` to a RANGE-partitioned table by mutation_date,
        one partition per year. Lets the DVF importer build a shadow partition
        for the year being refreshed, then swap it in atomically (no read
        downtime). Partitions for past years stay attached so the API keeps
        serving historical data while the current year is being rebuilt.

        PostgreSQL requires the partition key to be part of every unique
        constraint, so the primary key changes from (id) to (id, mutation_date).
        The Long `id` column is still globally unique because it's IDENTITY-
        generated, so JPA `findById(id)` still resolves to a single row — it
        just scans more partitions until partition pruning has stats. We
        accept the small overhead; per-row lookups by id are not on any hot
        path (the API filters by date / city / property_type).
      changes:
        - sql:
            comment: Rename the existing table out of the way before recreating it as partitioned
            sql: ALTER TABLE transactions RENAME TO transactions_legacy

        - sql:
            comment: Drop FK + indexes from the legacy table so we can recreate them on the new parent
            sql: |
              ALTER TABLE transactions_legacy DROP CONSTRAINT IF EXISTS fk_transaction_city;
              DROP INDEX IF EXISTS idx_transaction_city;
              DROP INDEX IF EXISTS idx_transaction_date;
              DROP INDEX IF EXISTS idx_transaction_type;

        - sql:
            comment: Create the partitioned parent table (composite PK, partition key included)
            sql: |
              CREATE TABLE transactions (
                id              BIGINT          NOT NULL GENERATED BY DEFAULT AS IDENTITY,
                mutation_date   DATE            NOT NULL,
                mutation_nature VARCHAR(50)     NOT NULL,
                property_value  NUMERIC(15, 2),
                street_number   VARCHAR(10),
                postal_code     VARCHAR(10),
                city_insee_code VARCHAR(5),
                section         VARCHAR(10),
                plan_number     VARCHAR(10),
                lot_count       INTEGER,
                property_type   VARCHAR(30),
                built_surface   DOUBLE PRECISION,
                room_count      INTEGER,
                land_surface    DOUBLE PRECISION,
                street_type     VARCHAR(255),
                CONSTRAINT pk_transactions PRIMARY KEY (id, mutation_date)
              ) PARTITION BY RANGE (mutation_date);

        - sql:
            comment: Create yearly partitions (2014-2030) + a DEFAULT for any out-of-range row
            sql: |
              CREATE TABLE transactions_2014 PARTITION OF transactions FOR VALUES FROM ('2014-01-01') TO ('2015-01-01');
              CREATE TABLE transactions_2015 PARTITION OF transactions FOR VALUES FROM ('2015-01-01') TO ('2016-01-01');
              CREATE TABLE transactions_2016 PARTITION OF transactions FOR VALUES FROM ('2016-01-01') TO ('2017-01-01');
              CREATE TABLE transactions_2017 PARTITION OF transactions FOR VALUES FROM ('2017-01-01') TO ('2018-01-01');
              CREATE TABLE transactions_2018 PARTITION OF transactions FOR VALUES FROM ('2018-01-01') TO ('2019-01-01');
              CREATE TABLE transactions_2019 PARTITION OF transactions FOR VALUES FROM ('2019-01-01') TO ('2020-01-01');
              CREATE TABLE transactions_2020 PARTITION OF transactions FOR VALUES FROM ('2020-01-01') TO ('2021-01-01');
              CREATE TABLE transactions_2021 PARTITION OF transactions FOR VALUES FROM ('2021-01-01') TO ('2022-01-01');
              CREATE TABLE transactions_2022 PARTITION OF transactions FOR VALUES FROM ('2022-01-01') TO ('2023-01-01');
              CREATE TABLE transactions_2023 PARTITION OF transactions FOR VALUES FROM ('2023-01-01') TO ('2024-01-01');
              CREATE TABLE transactions_2024 PARTITION OF transactions FOR VALUES FROM ('2024-01-01') TO ('2025-01-01');
              CREATE TABLE transactions_2025 PARTITION OF transactions FOR VALUES FROM ('2025-01-01') TO ('2026-01-01');
              CREATE TABLE transactions_2026 PARTITION OF transactions FOR VALUES FROM ('2026-01-01') TO ('2027-01-01');
              CREATE TABLE transactions_2027 PARTITION OF transactions FOR VALUES FROM ('2027-01-01') TO ('2028-01-01');
              CREATE TABLE transactions_2028 PARTITION OF transactions FOR VALUES FROM ('2028-01-01') TO ('2029-01-01');
              CREATE TABLE transactions_2029 PARTITION OF transactions FOR VALUES FROM ('2029-01-01') TO ('2030-01-01');
              CREATE TABLE transactions_2030 PARTITION OF transactions FOR VALUES FROM ('2030-01-01') TO ('2031-01-01');
              CREATE TABLE transactions_default PARTITION OF transactions DEFAULT;

        - sql:
            comment: Recreate indexes (Postgres propagates them to every partition automatically)
            sql: |
              CREATE INDEX idx_transaction_city ON transactions (city_insee_code);
              CREATE INDEX idx_transaction_date ON transactions (mutation_date);
              CREATE INDEX idx_transaction_type ON transactions (property_type);

        - sql:
            comment: Recreate FK on the partitioned parent (covers all partitions)
            sql: |
              ALTER TABLE transactions
                ADD CONSTRAINT fk_transaction_city
                FOREIGN KEY (city_insee_code) REFERENCES cities (insee_code);

        - sql:
            comment: Migrate the rows from the legacy table into the partitioned one
            sql: |
              INSERT INTO transactions (
                id, mutation_date, mutation_nature, property_value, street_number,
                postal_code, city_insee_code, section, plan_number, lot_count,
                property_type, built_surface, room_count, land_surface, street_type
              )
              SELECT id, mutation_date, mutation_nature, property_value, street_number,
                     postal_code, city_insee_code, section, plan_number, lot_count,
                     property_type, built_surface, room_count, land_surface, street_type
              FROM transactions_legacy;

        - sql:
            comment: Reset the IDENTITY high-water mark so future inserts don't collide with migrated ids
            sql: |
              SELECT setval(
                pg_get_serial_sequence('transactions', 'id'),
                COALESCE((SELECT MAX(id) FROM transactions), 0) + 1,
                false
              );

        - sql:
            comment: Drop the legacy table now that data is migrated
            sql: DROP TABLE transactions_legacy

      rollback:
        - sql:
            comment: Manual rollback only — partitioning is a one-way structural change
            sql: SELECT 1

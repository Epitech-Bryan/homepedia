services:
  traefik:
    image: traefik:v3.3
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8090:8080"   # Dashboard Traefik → http://localhost:8090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile.dev
    volumes:
      - ./webapp:/webapp
      - /webapp/node_modules
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.webapp.rule=Host(`homepedia.localhost`)
      - traefik.http.routers.webapp.entrypoints=web
      - traefik.http.routers.webapp.priority=1
      - traefik.http.services.webapp.loadbalancer.server.port=5173
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: rest-api/Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/homepedia
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-homepedia}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-homepedia}
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/homepedia
    depends_on:
      - db
      - mongo
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`homepedia.localhost`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.routers.backend.priority=2
      - traefik.http.middlewares.backend-strip.stripprefix.prefixes=/api
      - traefik.http.routers.backend.middlewares=backend-strip
      - traefik.http.services.backend.loadbalancer.server.port=8080
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=homepedia
      - POSTGRES_USER=${DB_USERNAME:-homepedia}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-homepedia}
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  spark-master:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
    ports:
      - "7077:7077"
      - "8088:8080"
    volumes:
      - ./backend/spark-jobs/target:/jobs:ro
      - spark-data:/data
    restart: unless-stopped

  spark-worker:
    image: bitnami/spark:3.5
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - ./backend/spark-jobs/target:/jobs:ro
      - spark-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  mongo-data:
  spark-data:

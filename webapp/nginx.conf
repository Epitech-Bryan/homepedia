server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vite emits hashed filenames in /assets/ — they're immutable. The
    # browser can cache them for a year and Cache-Control: immutable
    # tells it not to revalidate. index.html stays short-lived so a
    # deploy is picked up immediately.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # GZIP + pre-compressed (.gz/.br) static. vite-plugin-compression
    # emits both at build time, gzip_static / brotli_static then serve
    # them directly — no per-request CPU.
    gzip on;
    gzip_static on;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        application/wasm
        font/woff2
        image/svg+xml
        text/css
        text/html
        text/plain
        text/xml;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;

    # Brotli would shave another 15-25% but isn't in nginx:alpine by
    # default. Traefik handles brotli via the compress middleware in the
    # IngressRoute, so the wire format clients actually see is already
    # br-encoded — gzip_static here is just a fallback for clients that
    # bypass Traefik (none in prod).

    # Security baseline. CSP is permissive enough to keep our SPA
    # working with leaflet tiles + same-origin /api proxy.
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
